name: Video Downloader (Advanced)

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 Video video URL'
        required: true
        type: string
      quality:
        description: '🎬 Video quality'
        required: true
        default: 'best'
        type: choice
        options: [best, 2160, 1440, 1080, 720, 480, 360, 144, audio]
      use_warp:
        description: '🛡️ Use WARP (sometimes helps | +40s)'
        required: true
        default: true
        type: boolean
      parts_size:
        description: '🫙 Parts size (MB)'
        required: false
        type: string
        default: '45'
      output_name:
        description: '📝 Output file name (optional, without extension)'
        required: false
        type: string
      branch_name:
        description: 'ℹ️ Branch name (simultaneous workflows cannot be on the same branch)'
        required: true
        default: 'videos'
        type: string
      subtitles:
        description: "📄 Input for the subtitles. (e.g. `--sub-langs \"all\"`, `--sub-langs \"en.*\"`, `--sub-langs \"en.*,ja,per,fa\"`, `--sub-langs \"en.*\" --write-auto-subs` | `--sub-langs` defines languages, `--write-auto-subs` defines inclusion of auto-generated subtitles)"
        required: true
        default: '--sub-langs \"all\"'
        type: string

jobs:
  download-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Prepare branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin

          if git ls-remote --exit-code --heads origin ${{ inputs.branch_name }}; then
            git checkout ${{ inputs.branch_name }}
            git pull origin ${{ inputs.branch_name }}
          else
            git checkout --orphan ${{ inputs.branch_name }}
            git rm -rf . || true
            mkdir -p ${{ inputs.branch_name }}
            git commit --allow-empty -m "[bot] Initialize ${{ inputs.branch_name }} branch"
            git push --set-upstream origin ${{ inputs.branch_name }}
          fi

      - name: Setup FFmpeg
        run: |
          wget https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg-master-latest-linux64-gpl.tar.xz
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg /usr/local/bin/
          sudo mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe /usr/local/bin/
          ffmpeg -version

      - name: Setup WARP
        if: ${{ inputs.use_warp }}
        run: |
          # clean up any existing container/network (useful for self-hosted runners)
          docker rm -f warp 2>/dev/null || true
          docker network create warp-net 2>/dev/null || true

          # start WARP 
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize..."

          # dynamic polling loop (up to 30 seconds max)
          WARP_READY=false
          for i in {1..10}; do
            # use 1.1.1.1 for faster trace resolution
            RESULT=$(curl -s --max-time 3 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || true)
            
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP proxy is ready! (Took $i attempts)"
              echo "$RESULT" | grep -E "^(ip|warp|colo)=" # Print clean debug info
              WARP_READY=true
              break
            fi
            
            echo "Attempt $i/10 - WARP not ready, waiting 3s..."
            sleep 3
          done

          if [ "$WARP_READY" = false ]; then
            echo "WARP failed to activate fully, continuing anyway..."
            echo "Last response: $RESULT"
            # exit 1  <-- Uncomment this if you want the pipeline to FAIL when WARP fails
          fi

      - name: Setup yt-dlp
        run: |
          sudo apt-get install -y python3-pip curl
          pip install yt-dlp --pre

          # install deno
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version

      - name: Download videos
        id: download
        run: |
          # quality
          QUALITY="${{ inputs.quality }}"
          if [ "$QUALITY" = "audio" ]; then
              FORMAT_OPTS="-f ba -x --audio-format mp3"
          elif [ "$QUALITY" = "best" ]; then
              FORMAT_OPTS="--merge-output-format mp4"
          else
              FORMAT_OPTS="-f bv*[height<=${QUALITY}]+ba/b[height<=${QUALITY}] --merge-output-format mp4"
          fi
          
          # output
          OUTPUT_NAME="${{ inputs.output_name }}"
          if [ -n "$OUTPUT_NAME" ]; then
              OUTPUT_OPTS="-o ${OUTPUT_NAME}.%(ext)s"
          fi
          
          # download
          mkdir -p tmpvideos
          cd tmpvideos
          
          yt-dlp --remote-components ejs:github --proxy "socks5://127.0.0.1:1080" ${{ inputs.subtitles }} --embed-subs -i $FORMAT_OPTS $OUTPUT_OPTS "${{ inputs.url }}"

          # find name
          FILE=$(ls -1 | head -n 1)
          FILE_NO_EXTENSION="${FILE%.*}"
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "FILE_NO_EXTENSION=$FILE_NO_EXTENSION" >> $GITHUB_ENV
          SAFE_NAME=$(echo "$FILE_NO_EXTENSION" | sed 's/^[[:space:]]*//' | tr ' ' '_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV
          
          # zip and overwrite
          mkdir -p ../videos
          rm -rf tmpzip
          mkdir tmpzip
          zip -r -0 -s "${{ inputs.parts_size }}m" "tmpzip/${SAFE_NAME}.zip" "."
          mv tmpzip/* ../videos/
          
      - name: Stop WARP
        if: ${{ inputs.use_warp }}
        run: |
          docker stop warp || true

      - name: Generate README with Download Links
        run: |
          rm -f README.md
          
          echo "# 📥 Download Links" > README.md
          echo "Generated on: $(date)" >> README.md
          echo "" >> README.md
          
          # loop through all files in the videos folder
          for file in videos/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # URL Encode spaces for the markdown link
              encoded_filename=$(python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$filename")
              # Construct the raw link
              url="https://github.com/${{ github.repository }}/raw/${{ inputs.branch_name }}/videos/$encoded_filename"
              echo "- [Download $filename]($url)" >> README.md
            fi
          done
          
      - name: Commit
        run: |
          git add README.md videos
          git commit -m "[bot] Add video ${{ env.SAFE_NAME }}"
          git push
          
